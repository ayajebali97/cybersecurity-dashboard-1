version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: cybersecurity-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123   # changez-le pour un mot de passe sûr
      MYSQL_DATABASE: cybersecurity_dashboard
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword123       # changez-le aussi
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersecurity-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  db_data: